
<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="manifest.json">
<title>Shift Report</title>
<style>
body{font-family:Arial;background:#f3f3f3;margin:0}
main{max-width:700px;margin:auto;background:#fff;padding:16px;min-height:100vh}
input,textarea{width:100%;padding:8px;margin:4px 0 10px;box-sizing:border-box}
.card{border:1px solid #bbb;padding:10px;margin:8px 0;border-radius:6px;cursor:pointer}
#viewer{display:none;border:2px solid #333;padding:12px;margin-top:12px}
</style></head><body><main>
<h2>Shift Report</h2>
<div id="quick"></div>
<label>Date</label><input id="date" type="date">
<label>Project</label><input id="project">
<label>Location</label><input id="location">
<label>Start</label><input id="start" type="time">
<label>Finish</label><input id="finish" type="time">
<label><input id="breakBox" type="checkbox"> Break Taken</label>
<p><b>Hours Worked:</b> <span id="hours">0.00</span></p>
<label>Crew</label><textarea id="crew"></textarea>
<label>Works Completed</label><textarea id="completed"></textarea>
<label>Planned Works</label><textarea id="planned"></textarea>
<label>Delays</label><textarea id="delays"></textarea>
<label>Inclement Weather</label><textarea id="weather"></textarea>
<label>Notes</label><textarea id="notes"></textarea>
<button onclick="save()">Save Report</button>
<h3>Saved Reports</h3><div id="list"></div>
<div id="viewer"></div>
<script>
const ids=["date","project","location","start","finish","crew","completed","planned","delays","weather","notes"];
function calc(){
 if(!start.value||!finish.value)return;
 let s=start.value.split(":");let f=finish.value.split(":");
 let mins=(+f[0]*60+ +f[1])-(+s[0]*60+ +s[1]);
 let d=new Date(date.value); let wk=d.getDay();
 if(breakBox.checked && wk>0 && wk<6) mins-=30;
 hours.textContent=(mins/60).toFixed(2);
}
start.onchange=finish.onchange=breakBox.onchange=date.onchange=calc;
function all(){return JSON.parse(localStorage.reports||"[]")}
function render(){
 let a=all();
 quick.innerHTML=a.length?'<b>Quick View:</b> '+a[0].date+' - '+a[0].project:'<b>No reports saved</b>';
 list.innerHTML="";
 a.forEach((r,i)=>{
  let c=document.createElement("div");
  c.className="card";
  c.innerHTML="<b>"+r.date+"</b> - "+r.project;
  c.onclick=()=>openR(i);
  list.appendChild(c);
 });
}
function save(){
 calc();
 let r={};
 ids.forEach(id=>r[id]=document.getElementById(id).value);
 r.breakTaken=breakBox.checked;
 r.hours=hours.textContent;
 let a=all();a.unshift(r);
 localStorage.reports=JSON.stringify(a);
 render();
 alert("Saved");
}
function openR(i){
 let r=all()[i];
 viewer.style.display="block";
 viewer.innerHTML=`<h3>${r.date}</h3>
 <p><b>Project:</b> ${r.project}</p>
 <p><b>Location:</b> ${r.location}</p>
 <p><b>Hours:</b> ${r.hours}</p>
 <p><b>Crew:</b><br>${r.crew}</p>
 <p><b>Completed:</b><br>${r.completed}</p>
 <p><b>Planned:</b><br>${r.planned}</p>
 <p><b>Delays:</b><br>${r.delays}</p>
 <p><b>Weather:</b><br>${r.weather}</p>
 <p><b>Notes:</b><br>${r.notes}</p>
 <button onclick="editReport(${i})">Edit</button>`;
}
function editReport(i){
 let r=all()[i];
 ids.forEach(id=>document.getElementById(id).value=r[id]||"");
 breakBox.checked=r.breakTaken;
 calc();
 let a=all();a.splice(i,1);
 localStorage.reports=JSON.stringify(a);
 render();
 window.scrollTo(0,0);
}
render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}
</script></main></body></html>
